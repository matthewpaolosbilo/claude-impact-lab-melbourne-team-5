  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

t-brand: \"Bungee\", sans-serif;\n    --font-body:  \"Space Grotesk\", system-ui, sans-serif;\n    --font-mono:  \"DM Mono\", monospace;\n  }\n\n  html, body { margin: 0; padding: 0; background: #0a0a09; }\n  body { font-family: var(--font-body); color: var(--ink); }\n\n  deck-stage { display: block; }\n\n  section {\n    background: var(--bg-primary);\n    color: var(--ink);\n    padding: var(--pad-top) var(--pad-x) var(--pad-bottom);\n    box-sizing: border-box;\n    overflow: hidden;\n    position: relative;\n  }\n\n  /* Variants */\n  section.ink { background: var(--ink); color: var(--bg-primary); }\n  section.lime { background: var(--lime); color: var(--lime-ink); }\n  section.electric { background: var(--electric); color: var(--electric-ink); }\n  section.coral { background: var(--coral); color: #fff; }\n\n  /* Pixel deco strip — used as a divider in headers */\n  .px-deco {\n    display: flex;\n    gap: 0;\n    height: 12px;\n    margin-bottom: 32px;\n  }\n  .px-sq { width: 12px; height: 12px; display: inline-block; image-rendering: pixelated; }\n\n  /* Section label / chrome */\n  .label {\n    font-family: var(--font-mono);\n    font-size: var(--type-label);\n    letter-spacing: 0.10em;\n    text-transform: uppercase;\n    font-weight: 500;\n    color: var(--ink-2);\n  }\n  section.ink .label { color: var(--ink-3); }\n  section.lime .label, section.electric .label, section.coral .label { color: rgba(26,25,23,0.55); }\n  section.electric .label, section.coral .label { color: rgba(255,255,255,0.7); }\n\n  .page-num {\n    font-family: var(--font-mono);\n    font-size: var(--type-label);\n    color: var(--ink-3);\n    letter-spacing: 0.08em;\n  }\n  section.ink .page-num { color: var(--ink-2); }\n  section.electric .page-num, section.coral .page-num { color: rgba(255,255,255,0.55); }\n  section.lime .page-num { color: rgba(26,25,23,0.5); }\n\n  .header-row {\n    display: flex;\n    justify-content: space-between;\n    align-items: center;\n    gap: 40px;\n    margin-bottom: var(--gap-title);\n  }\n\n  /* Bungee titles */\n  .title {\n    font-family: var(--font-brand);\n    font-weight: 400;\n    font-size: var(--type-title);\n    line-height: 1.0;\n    letter-spacing: 0.005em;\n    margin: 0;\n  }\n  .title .lime { color: var(--lime); }\n  .title .electric { color: var(--electric); }\n  .title .coral { color: var(--coral); }\n\n  .body-text {\n    font-family: var(--font-body);\n    font-size: var(--type-body);\n    line-height: 1.45;\n    letter-spacing: -0.005em;\n    font-weight: 400;\n    max-width: 1100px;\n    margin: 0;\n  }\n  .small-text {\n    font-family: var(--font-body);\n    font-size: var(--type-small);\n    line-height: 1.5;\n    color: var(--ink-2);\n    margin: 0;\n  }\n  section.ink .small-text { color: var(--ink-3); }\n\n  /* Pixel card primitive */\n  .pxcard {\n    outline: var(--pixel-border);\n    background: var(--surface);\n    box-shadow: var(--pixel-shadow);\n    padding: 36px;\n  }\n  section.ink .pxcard { outline: var(--pixel-border-light); box-shadow: 6px 6px 0 var(--lime); background: var(--ink); }\n\n  /* Pill / chip */\n  .chip {\n    display: inline-flex;\n    align-items: center;\n    gap: 10px;\n    font-family: var(--font-mono);\n    font-size: 24px;\n    padding: 10px 18px;\n    background: var(--bg-secondary);\n    outline: 2px solid var(--ink);\n    color: var(--ink);\n    image-rendering: pixelated;\n  }\n  .chip.lime { background: var(--lime); color: var(--lime-ink); }\n  .chip.electric { background: var(--electric); color: var(--electric-ink); }\n  .chip.coral { background: var(--coral); color: #fff; }\n  .chip.ink { background: var(--ink); color: var(--bg-primary); outline-color: var(--ink); }\n\n  /* ==================== SLIDE 1: HOOK ==================== */\n  .s-hook {\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    gap: 0;\n    padding: 0 !important;\n  }\n  .hook-col {\n    padding: var(--pad-top) 80px var(--pad-bottom);\n    display: flex;\n    flex-direction: column;\n    justify-content: space-between;\n    gap: 40px;\n  }\n  .hook-col.left { background: var(--bg-primary); color: var(--ink); }\n  .hook-col.right { background: var(--ink); color: var(--bg-primary); border-left: 4px solid var(--ink); }\n  .hook-tag {\n    font-family: var(--font-mono);\n    font-size: 26px;\n    letter-spacing: 0.12em;\n    text-transform: uppercase;\n  }\n  .hook-col.left .hook-tag { color: var(--electric); }\n  .hook-col.right .hook-tag { color: var(--lime); }\n  .hook-line {\n    font-family: var(--font-brand);\n    font-size: 80px;\n    line-height: 1.05;\n    letter-spacing: 0.005em;\n    margin: 0;\n  }\n  .hook-desc {\n    font-family: var(--font-body);\n    font-size: 28px;\n    line-height: 1.5;\n    max-width: 540px;\n    margin: 0;\n  }\n  .hook-col.right .hook-desc { color: var(--ink-3); }\n\n  /* Pixel sprite grouping */\n  .sprite-row { display: flex; gap: 12px; align-items: flex-end; }\n  .sprite-row svg { image-rendering: pixelated; outline: 2px solid currentColor; }\n\n  /* ==================== SLIDE 0: OPENER ==================== */\n  .s-opener { display: flex; flex-direction: column; height: 100%; }\n  .opener-body {\n    flex: 1;\n    display: flex; flex-direction: column;\n    justify-content: center;\n    gap: 36px;\n    max-width: 1600px;\n  }\n  .opener-question {\n    font-family: var(--font-brand);\n    font-size: 90px;\n    line-height: 1.1;\n    margin: 0;\n    color: var(--ink);\n    letter-spacing: 0.005em;\n  }\n  .opener-question .hl {\n    background: var(--lime);\n    color: var(--lime-ink);\n    padding: 2px 14px;\n  }\n  .opener-question .star { color: var(--electric); }\n  .opener-bridge {\n    font-family: var(--font-body);\n    font-size: 30px;\n    line-height: 1.45;\n    color: var(--ink-2);\n    margin: 0;\n    max-width: 1200px;\n  }\n  .opener-bridge b {\n    color: var(--ink);\n    font-weight: 600;\n  }\n  .opener-divider {\n    display: flex;\n    gap: 8px;\n    height: 14px;\n  }\n  .opener-divider .px-sq { width: 14px; height: 14px; image-rendering: pixelated; }\n  .opener-foot {\n    display: flex; justify-content: space-between; align-items: flex-end;\n    padding-top: 32px;\n    border-top: 2px solid var(--ink);\n  }\n  .opener-sprites { display: flex; gap: 14px; align-items: flex-end; }\n  .opener-sprites svg { image-rendering: pixelated; outline: 2px solid var(--ink); }\n\n  /* ==================== SLIDE 1: THE PROBLEM ==================== */\n  .s-problem { display: flex; flex-direction: column; height: 100%; }\n  .problem-grid {\n    display: grid;\n    grid-template-columns: 1.1fr 1fr;\n    gap: 80px;\n    flex: 1;\n    margin-top: 16px;\n    align-items: stretch;\n  }\n  .problem-text {\n    display: flex; flex-direction: column;\n    justify-content: space-between;\n    gap: 32px;\n  }\n  .problem-para {\n    font-family: var(--font-body);\n    font-size: 42px;\n    line-height: 1.4;\n    color: var(--bg-primary);\n    margin: 0;\n    max-width: 780px;\n  }\n  .problem-para b {\n    color: var(--lime);\n    font-weight: 600;\n  }\n  .problem-para .alone {\n    background: var(--coral);\n    color: #fff;\n    padding: 2px 10px;\n    font-weight: 500;\n  }\n  .problem-punch {\n    font-family: var(--font-brand);\n    font-size: 132px;\n    line-height: 1.05;\n    color: var(--bg-primary);\n    margin: 0;\n  }\n  .problem-punch .star { color: var(--lime); }\n  .problem-punch em { font-style: normal; color: var(--lime); }\n\n  .problem-stats {\n    display: flex; flex-direction: column;\n    gap: 40px;\n    justify-content: center;\n  }\n  .problem-divider {\n    display: flex;\n    gap: 8px;\n    height: 14px;\n    margin: 8px 0;\n  }\n  .problem-divider .px-sq { width: 14px; height: 14px; image-rendering: pixelated; }\n  .problem-stat {\n    padding: 32px 36px;\n    outline: 2px solid var(--bg-primary);\n    background: rgba(245,244,240,0.03);\n    display: flex; flex-direction: column; gap: 18px;\n  }\n  .problem-stat.lime-shadow { box-shadow: 10px 10px 0 var(--lime); }\n  .problem-stat.coral-shadow { box-shadow: 10px 10px 0 var(--coral); }\n  .ps-num {\n    font-family: var(--font-brand);\n    font-size: 180px;\n    line-height: 1.0;\n    margin: 0;\n    letter-spacing: 0.005em;\n  }\n  .ps-num.lime { color: var(--lime); }\n  .ps-num.coral { color: var(--coral); }\n  .ps-cap {\n    font-family: var(--font-body);\n    font-size: 24px;\n    line-height: 1.4;\n    color: var(--ink-3);\n    margin: 0;\n    max-width: 460px;\n  }\n  .ps-cap b { color: var(--bg-primary); font-weight: 600; }\n\n  /* ==================== SLIDE 2: SCALE ==================== */\n  .s-scale { display: flex; flex-direction: column; height: 100%; }\n  .scale-grid {\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    gap: 60px;\n    flex: 1;\n    align-items: stretch;\n    margin: 24px 0 40px;\n  }\n  .scale-cell {\n    display: flex; flex-direction: column;\n    justify-content: space-between;\n    padding: 40px;\n    outline: var(--pixel-border-light);\n    background: rgba(255,255,255,0.02);\n  }\n  .scale-cell.lime-accent { box-shadow: 8px 8px 0 var(--lime); }\n  .scale-cell.coral-accent { box-shadow: 8px 8px 0 var(--coral); }\n  .scale-num {\n    font-family: var(--font-brand);\n    font-size: 200px;\n    line-height: 1.0;\n    margin: 0;\n    letter-spacing: 0.005em;\n  }\n  .scale-num.lime { color: var(--lime); }\n  .scale-num.coral { color: var(--coral); }\n  .scale-cap {\n    font-family: var(--font-body);\n    font-size: 26px;\n    line-height: 1.45;\n    color: var(--ink-3);\n    margin: 0;\n    max-width: 480px;\n  }\n  .scale-cap b { color: var(--bg-primary); font-weight: 600; }\n\n  .scale-foot {\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    gap: 48px;\n    padding-top: 28px;\n    border-top: 2px dashed rgba(240,239,233,0.2);\n  }\n  .scale-row {\n    display: flex; gap: 16px; align-items: baseline;\n    font-family: var(--font-body);\n    font-size: 24px;\n    line-height: 1.4;\n    color: var(--ink-3);\n    margin: 0;\n  }\n  .scale-row .n {\n    font-family: var(--font-mono);\n    font-size: 24px;\n    color: var(--lime);\n    min-width: 36px;\n  }\n  .scale-row b { color: var(--bg-primary); font-weight: 600; }\n\n  /* ==================== SLIDE 3: BRAND ==================== */\n  .s-brand {\n    background: var(--lime);\n    color: var(--lime-ink);\n    display: flex; flex-direction: column;\n    justify-content: space-between;\n  }\n  .brand-top { display: flex; justify-content: space-between; align-items: center; }\n  .brand-hero {\n    display: grid;\n    grid-template-columns: 540px 1fr;\n    gap: 80px;\n    align-items: center;\n    margin: 12px 0;\n  }\n  .logo-card {\n    background: var(--surface);\n    outline: 3px solid var(--ink);\n    box-shadow: 12px 12px 0 var(--ink);\n    padding: 36px;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n  }\n  .logo-card img {\n    display: block;\n    width: 100%;\n    height: auto;\n    image-rendering: pixelated;\n  }\n  .logo-badge {\n    background: var(--ink);\n    color: var(--lime);\n    padding: 14px 36px;\n    font-family: var(--font-brand);\n    font-size: 44px;\n    outline: 3px solid var(--ink);\n    box-shadow: 8px 8px 0 var(--ink);\n    display: inline-block;\n  }\n  .brand-mark {\n    font-family: var(--font-brand);\n    font-size: 140px;\n    line-height: 1.0;\n    margin: 0;\n    padding-bottom: 16px;\n    letter-spacing: 0.005em;\n    color: var(--ink);\n  }\n  .brand-mark .star { color: var(--electric); }\n  .brand-tag {\n    font-family: var(--font-body);\n    font-size: 44px;\n    line-height: 1.25;\n    font-weight: 500;\n    max-width: 1400px;\n    color: var(--ink);\n    margin: 0;\n  }\n  .brand-tag b { background: var(--ink); color: var(--lime); padding: 2px 14px; }\n  .brand-bot { display: flex; justify-content: space-between; align-items: center; gap: 40px; }\n  .brand-pill-row { display: flex; gap: 10px; flex-wrap: wrap; }\n\n  /* ==================== SLIDE 4: HOW ==================== */\n  .s-how { display: flex; flex-direction: column; height: 100%; }\n  .how-grid {\n    display: grid;\n    grid-template-columns: 1fr auto 1fr auto 1fr;\n    gap: 0;\n    align-items: stretch;\n    margin-top: 40px;\n    flex: 1;\n  }\n  .how-card {\n    outline: var(--pixel-border);\n    background: var(--surface);\n    padding: 0;\n    display: flex; flex-direction: column;\n    min-height: 520px;\n  }\n  .how-card.shadow-lime { box-shadow: 10px 10px 0 var(--lime); }\n  .how-card.shadow-electric { box-shadow: 10px 10px 0 var(--electric); }\n  .how-card.shadow-coral { box-shadow: 10px 10px 0 var(--coral); }\n  .how-accent {\n    height: 14px;\n    image-rendering: pixelated;\n  }\n  .how-card .inner { padding: 32px 32px 36px; display: flex; flex-direction: column; gap: 20px; flex: 1; }\n  .how-card .tag {\n    font-family: var(--font-mono);\n    font-size: 24px;\n    letter-spacing: 0.10em;\n    text-transform: uppercase;\n    color: var(--ink-2);\n  }\n  .how-card h3 {\n    font-family: var(--font-brand);\n    font-size: 80px;\n    line-height: 0.98;\n    margin: 0;\n  }\n  .how-card .desc {\n    font-family: var(--font-body);\n    font-size: 26px;\n    line-height: 1.4;\n    color: var(--ink);\n    margin: auto 0 0;\n  }\n  .how-op {\n    align-self: center;\n    font-family: var(--font-brand);\n    font-size: 80px;\n    color: var(--ink);\n    padding: 0 20px;\n  }\n  .how-foot {\n    margin-top: 32px;\n    font-family: var(--font-mono);\n    font-size: 24px;\n    color: var(--ink-2);\n    letter-spacing: 0.06em;\n  }\n\n  /* ==================== SLIDE 5: COACH ==================== */\n  .s-coach { display: grid; grid-template-columns: 1fr 1.05fr; gap: 80px; height: 100%; }\n  .coach-left { display: flex; flex-direction: column; justify-content: space-between; gap: 32px; }\n  .coach-title {\n    font-family: var(--font-brand);\n    font-size: 92px;\n    line-height: 1.3;\n    margin: 0;\n  }\n  .coach-title .strike a66075\" alt=\"Spacd logo — two pixel-art figures fist-bumping above the Spacd wordmark and tagline 'your space · your people'\">\n      <\u002Fdiv>\n      <p class=\"brand-mark\">Find your<br>Melbourne<br>Squad.<span class=\"star\"> ✦<\u002Fspan><\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"brand-bot\">\n      <p class=\"brand-tag\">Spacd helps people <b>find their people<\u002Fb> — by building community from the ground up, together.<\u002Fp>\n      <div class=\"brand-pill-row\">\n        <span class=\"chip ink\"><div>No sign-up, no commitment.<\u002Fdiv><\u002Fspan>\n        <span class=\"chip ink\"><div>Your Squad, your rules.<\u002Fdiv><\u002Fspan>\n        <span class=\"chip ink\"><div>Built around you.<\u002Fdiv><\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 4 — HOW IT WORKS ---------------------------------------------------- -->\n  <section data-label=\"04 How\" class=\"s-how\">\n    <div class=\"header-row\">\n      <span class=\"label\">// how it works<\u002Fspan>\n      <span class=\"page-num\">04 / 07<\u002Fspan>\n    <\u002Fdiv>\n    <h1 class=\"title\">The core loop: <span class=\"electric\">Squads<\u002Fspan> <span style=\"color:var(--ink-2);\">×<\u002Fspan> <span class=\"coral\">Spaces<\u002Fspan> <span style=\"color:var(--ink-2);\">=<\u002Fspan> Events.<\u002Fh1>\n\n    <div class=\"how-grid\">\n      <div class=\"how-card shadow-electric\">\n        <div class=\"how-accent\" style=\"background: var(--electric);\"><\u002Fdiv>\n        <div class=\"inner\">\n          <span class=\"tag\">// the people<\u002Fspan>\n          <h3>SQUADS<\u002Fh3>\n          <p class=\"desc\" style=\"\">Self-governing community groups. No admin. Every member votes on who joins, what happens, where you meet.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"how-op\">×<\u002Fdiv>\n      <div class=\"how-card shadow-coral\">\n        <div class=\"how-accent\" style=\"background: var(--coral);\"><\u002Fdiv>\n        <div cl lose\" class=\"s-close\">\n    <div>\n      <div class=\"header-row\">\n        <span class=\"label\">// the close<\u002Fspan>\n        <span class=\"page-num\">06 / 07<\u002Fspan>\n      <\u002Fdiv>\n      <p class=\"close-line\">Community isn't<br>built <span class=\"strike\">for<\u002Fspan> people.<br><span class=\"by\">It's built by them.<\u002Fspan> ✦<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"close-foot\">\n      <div class=\"close-block\">\n        <p class=\"close-ask\">\n          <span class=\"ask-tag\">// the ask<\u002Fspan>\n          We're looking for a <b>university or council partner<\u002Fb> who wants to be part of something real. <span class=\"ask-emph\">One cohort. One city.<\u002Fspan> Let's see what happens.\n        <\u002Fp>\n        <p class=\"close-sub\">Help us hand the tools back to the 180,000 people who already know how to do this — they just need somewhere start.<\u002Fp>\n      <\u002Fdiv>\n      <p class=\"close-signoff\">SPACD ✦<br>// claude impact lab · 2026<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 9 — QR ------------------------------------------------------------- -->\n  <section data-label=\"09 Scan\" class=\"s-qr\" data-deck-last-visible=\"\">\n    <div class=\"header-row\">\n      <span class=\"label\" style=\"color: rgba(26,25,23,0.6);\">// scan in<\u002Fspan>\n      <span class=\"page-num\" style=\"color: rgba(26,25,23,0.55);\">07 / 07<\u002Fspan>\n    <\u002Fdiv>\n\n    <div class=\"qr-grid\">\n      <div class=\"qr-card\">\n        <img src=\"ff88d994-d32e-4d34-a989-04f2703c0f8a\" alt=\"QR code linking to Spacd\">\n      <\u002Fdiv>\n\n      <div class=\"qr-text\">\n        <p class=\"qr-headline\">Scan it.<span class=\"star\"> ✦<\u002Fspan><br><span class=\"em\">Join us.<\u002Fspan><\u002Fp>\n        <p class=\"qr-sub\">Point your camera. Browse Squads, Spaces, and what's happening this week. <b>No signup needed.<\u002Fb><\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"qr-foot\">\n      <sp
